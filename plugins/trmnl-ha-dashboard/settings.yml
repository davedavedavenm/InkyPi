name: HA Dashboard
description: A shareable TRMNL/LaraPaper Home Assistant dashboard with a Liquid compatibility template and optional indexed-colour sidecar renderer for Pimoroni Inky Impression Spectra panels.
author: David
version: 2.10.0
no_screen_padding: 'yes'
dark_mode: 'no'
strategy: webhook
refresh_interval: 10
id: trmnl-ha-dashboard
custom_fields:
  - keyname: dashboard_title
    field_type: text
    name: Dashboard Title
    default: "Home Assistant"
    placeholder: "Home Assistant"
  - keyname: instance_label
    field_type: text
    name: Instance Label
    default: "Home"
    placeholder: "Home"
  - keyname: layout_variant
    field_type: text
    name: Layout Variant
    default: "compact_grid"
    placeholder: "compact_grid"
  - keyname: colour_profile
    field_type: text
    name: Colour Profile
    default: "inky_spectra_7"
    placeholder: "inky_spectra_7"
  - keyname: ha_url
    field_type: text
    name: Home Assistant URL
    default: "http://homeassistant.local:8123"
    placeholder: "http://homeassistant.local:8123"
  - keyname: ha_token
    field_type: password
    name: Home Assistant Long-Lived Token
    default: ""
    placeholder: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
  - keyname: sonos_entities
    field_type: multi_string
    name: Sonos Media Players (comma-separated)
    default: ""
    placeholder: "media_player.living_room, media_player.kitchen"
  - keyname: light_entities
    field_type: multi_string
    name: Light Entities (comma-separated)
    default: ""
    placeholder: "light.living_room, light.bedroom, light.kitchen"
  - keyname: light_labels
    field_type: multi_string
    name: Light Labels (comma-separated)
    default: ""
    placeholder: "Living, Bedroom, Kitchen"
  - keyname: person_entities
    field_type: multi_string
    name: Person Entities (comma-separated)
    default: "person.example"
    placeholder: "person.alex, person.sam"
  - keyname: weather_entity
    field_type: text
    name: Weather Entity
    default: "weather.forecast_home"
    placeholder: "weather.forecast_home"
  - keyname: door_entity
    field_type: text
    name: Door Lock Entity
    default: ""
    placeholder: "binary_sensor.front_door_locked"
  - keyname: door_label
    field_type: text
    name: Door Label
    default: "Front door"
    placeholder: "Front door"
  - keyname: door_detail_label
    field_type: text
    name: Door Detail Label
    default: "Security"
    placeholder: "Security"
  - keyname: washer_entity
    field_type: text
    name: Washer Status Entity
    default: ""
    placeholder: "binary_sensor.washer_running"
  - keyname: washer_label
    field_type: text
    name: Washer Label
    default: "Washer"
    placeholder: "Washer"
  - keyname: washer_detail_label
    field_type: text
    name: Washer Detail Label
    default: "Utility"
    placeholder: "Utility"
  - keyname: blind_entity
    field_type: text
    name: Blinds Entity
    default: ""
    placeholder: "cover.living_room_blinds"
  - keyname: blind_label
    field_type: text
    name: Blind Label
    default: "Blinds"
    placeholder: "Blinds"
  - keyname: blind_detail_label
    field_type: text
    name: Blind Detail Label
    default: "Position"
    placeholder: "Position"
  - keyname: blind_open_position
    field_type: text
    name: Blind Open Position
    default: "100"
    placeholder: "100"
  - keyname: thermostat_entity
    field_type: text
    name: Thermostat Entity
    default: ""
    placeholder: "climate.thermostat"
  - keyname: thermostat_label
    field_type: text
    name: Thermostat Label
    default: "Climate"
    placeholder: "Climate"
  - keyname: thermostat_detail_label
    field_type: text
    name: Thermostat Detail Label
    default: "Indoor"
    placeholder: "Indoor"
  - keyname: sonos_label
    field_type: text
    name: Sonos Label
    default: "Sonos"
    placeholder: "Sonos"
  - keyname: people_label
    field_type: text
    name: People Label
    default: "People"
    placeholder: "People"
  - keyname: media_label
    field_type: text
    name: Media Label
    default: "Media"
    placeholder: "Media"
