name: HA Dashboard
description: A shareable TRMNL/LaraPaper Home Assistant dashboard with a Liquid compatibility template and optional indexed-colour sidecar renderer for Pimoroni Inky Impression Spectra panels.
author: David
version: 2.11.0
no_screen_padding: 'yes'
dark_mode: 'no'
strategy: webhook
refresh_interval: 10
id: trmnl-ha-dashboard
custom_fields:
  - keyname: dashboard_title
    field_type: text
    name: Dashboard Title
    default: "Home Assistant"
    placeholder: "Home Assistant"
  - keyname: instance_label
    field_type: text
    name: Instance Label
    default: "Home"
    placeholder: "Home"
  - keyname: layout_variant
    field_type: text
    name: Layout Variant
    default: "compact_grid"
    placeholder: "compact_grid"
  - keyname: colour_profile
    field_type: text
    name: Colour Profile
    default: "inky_spectra_7"
    placeholder: "inky_spectra_7"
  - keyname: ha_url
    field_type: text
    name: Home Assistant URL
    default: "http://homeassistant.local:8123"
    placeholder: "http://homeassistant.local:8123"
  - keyname: ha_token
    field_type: password
    name: Home Assistant Long-Lived Token
    default: ""
    placeholder: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
  - keyname: sonos_entities
    field_type: multi_string
    name: Sonos Media Players (comma-separated)
    default: ""
    placeholder: "media_player.living_room, media_player.kitchen"
  - keyname: light_entities
    field_type: multi_string
    name: Light Entities (comma-separated)
    default: ""
    placeholder: "light.living_room, light.bedroom, light.kitchen"
  - keyname: light_labels
    field_type: multi_string
    name: Light Labels (comma-separated)
    default: ""
    placeholder: "Living, Bedroom, Kitchen"
  - keyname: person_entities
    field_type: multi_string
    name: Person Entities (comma-separated)
    default: "person.example"
    placeholder: "person.alex, person.sam"
  - keyname: weather_entity
    field_type: text
    name: Weather Entity
    default: "weather.forecast_home"
    placeholder: "weather.forecast_home"
  - keyname: door_entity
    field_type: text
    name: Door Lock Entity
    default: ""
    placeholder: "binary_sensor.front_door_locked"
  - keyname: door_label
    field_type: text
    name: Door Label
    default: "Front door"
    placeholder: "Front door"
  - keyname: door_detail_label
    field_type: text
    name: Door Detail Label
    default: "Security"
    placeholder: "Security"
  - keyname: washer_entity
    field_type: text
    name: Washer Status Entity
    default: ""
    placeholder: "binary_sensor.washer_running"
  - keyname: washer_label
    field_type: text
    name: Washer Label
    default: "Washer"
    placeholder: "Washer"
  - keyname: washer_detail_label
    field_type: text
    name: Washer Detail Label
    default: "Utility"
    placeholder: "Utility"
  - keyname: blind_entity
    field_type: text
    name: Blinds Entity
    default: ""
    placeholder: "cover.living_room_blinds"
  - keyname: blind_label
    field_type: text
    name: Blind Label
    default: "Blinds"
    placeholder: "Blinds"
  - keyname: blind_detail_label
    field_type: text
    name: Blind Detail Label
    default: "Position"
    placeholder: "Position"
  - keyname: blind_open_position
    field_type: text
    name: Blind Open Position
    default: "100"
    placeholder: "100"
  - keyname: thermostat_entity
    field_type: text
    name: Thermostat Entity
    default: ""
    placeholder: "climate.thermostat"
  - keyname: thermostat_label
    field_type: text
    name: Thermostat Label
    default: "Climate"
    placeholder: "Climate"
  - keyname: thermostat_detail_label
    field_type: text
    name: Thermostat Detail Label
    default: "Indoor"
    placeholder: "Indoor"
  - keyname: sonos_label
    field_type: text
    name: Sonos Label
    default: "Sonos"
    placeholder: "Sonos"
  - keyname: people_label
    field_type: text
    name: People Label
    default: "People"
    placeholder: "People"
  - keyname: media_label
    field_type: text
    name: Media Label
    default: "Media"
    placeholder: "Media"
  - keyname: generic_entities
    field_type: multi_string
    name: Generic Entities (comma-separated)
    default: ""
    placeholder: "sensor.server_status, sensor.bin_day"
  - keyname: generic_labels
    field_type: multi_string
    name: Generic Entity Labels (comma-separated)
    default: ""
    placeholder: "Server, Bins"
  - keyname: generic_icons
    field_type: multi_string
    name: Generic Entity Icons (comma-separated)
    default: ""
    placeholder: "server, calendar"
  - keyname: generic_status_colours
    field_type: multi_string
    name: Generic Status Colours (comma-separated)
    default: ""
    placeholder: "green, yellow"
  - keyname: top_left_card_type
    field_type: text
    name: Top Left Card Type
    default: "weather"
    placeholder: "weather"
  - keyname: top_left_entity
    field_type: text
    name: Top Left Entity
    default: ""
    placeholder: "sensor.example"
  - keyname: top_left_label
    field_type: text
    name: Top Left Label
    default: ""
    placeholder: "Weather"
  - keyname: top_left_detail_label
    field_type: text
    name: Top Left Detail Label
    default: ""
    placeholder: "Today"
  - keyname: top_right_card_type
    field_type: text
    name: Top Right Card Type
    default: "indoor"
    placeholder: "indoor"
  - keyname: top_right_entity
    field_type: text
    name: Top Right Entity
    default: ""
    placeholder: "sensor.example"
  - keyname: top_right_label
    field_type: text
    name: Top Right Label
    default: ""
    placeholder: "Indoor"
  - keyname: top_right_detail_label
    field_type: text
    name: Top Right Detail Label
    default: ""
    placeholder: "Home"
  - keyname: status_1_card_type
    field_type: text
    name: Status 1 Card Type
    default: "door_lock"
    placeholder: "door_lock"
  - keyname: status_1_entity
    field_type: text
    name: Status 1 Entity
    default: ""
    placeholder: "binary_sensor.front_door_locked"
  - keyname: status_1_label
    field_type: text
    name: Status 1 Label
    default: "Front door"
    placeholder: "Front door"
  - keyname: status_1_detail_label
    field_type: text
    name: Status 1 Detail Label
    default: "Security"
    placeholder: "Security"
  - keyname: status_2_card_type
    field_type: text
    name: Status 2 Card Type
    default: "cover"
    placeholder: "cover"
  - keyname: status_2_entity
    field_type: text
    name: Status 2 Entity
    default: ""
    placeholder: "cover.living_room_blinds"
  - keyname: status_2_label
    field_type: text
    name: Status 2 Label
    default: "Blinds"
    placeholder: "Blinds"
  - keyname: status_2_detail_label
    field_type: text
    name: Status 2 Detail Label
    default: "Position"
    placeholder: "Position"
  - keyname: status_3_card_type
    field_type: text
    name: Status 3 Card Type
    default: "washer"
    placeholder: "washer"
  - keyname: status_3_entity
    field_type: text
    name: Status 3 Entity
    default: ""
    placeholder: "binary_sensor.washer_running"
  - keyname: status_3_label
    field_type: text
    name: Status 3 Label
    default: "Washer"
    placeholder: "Washer"
  - keyname: status_3_detail_label
    field_type: text
    name: Status 3 Detail Label
    default: "Utility"
    placeholder: "Utility"
  - keyname: bottom_left_card_type
    field_type: text
    name: Bottom Left Card Type
    default: "person_group"
    placeholder: "person_group"
  - keyname: bottom_left_entity
    field_type: text
    name: Bottom Left Entity
    default: ""
    placeholder: "sensor.example"
  - keyname: bottom_left_label
    field_type: text
    name: Bottom Left Label
    default: "People"
    placeholder: "People"
  - keyname: bottom_left_detail_label
    field_type: text
    name: Bottom Left Detail Label
    default: ""
    placeholder: "Presence"
  - keyname: bottom_right_card_type
    field_type: text
    name: Bottom Right Card Type
    default: "media"
    placeholder: "media"
  - keyname: bottom_right_entity
    field_type: text
    name: Bottom Right Entity
    default: ""
    placeholder: "media_player.living_room"
  - keyname: bottom_right_label
    field_type: text
    name: Bottom Right Label
    default: "Media"
    placeholder: "Media"
  - keyname: bottom_right_detail_label
    field_type: text
