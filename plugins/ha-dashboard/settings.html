<!DOCTYPE html>
<html>
<head>
    <style>
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"], input[type="password"] { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="form-group">
        <label for="ha_url">Home Assistant URL:</label>
        <input type="text" id="ha_url" name="ha_url" placeholder="http://192.168.1.89:8123">
    </div>
    <div class="form-group">
        <label for="ha_token">Home Assistant Token:</label>
        <input type="password" id="ha_token" name="ha_token">
    </div>
    <div class="form-group">
        <label for="sonos_entities">Sonos Entities (comma-separated):</label>
        <input type="text" id="sonos_entities" name="sonos_entities" placeholder="media_player.living_room, media_player.kitchen">
    </div>
    
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (loadPluginSettings) {
                document.getElementById('ha_url').value = pluginSettings.ha_url || '';
                document.getElementById('ha_token').value = pluginSettings.ha_token || '';
                document.getElementById('sonos_entities').value = pluginSettings.sonos_entities || '';
            }
        });
    </script>
</body>
</html>
